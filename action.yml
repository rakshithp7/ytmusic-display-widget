name: 'YTMusicDisplayWidget'
description: 'Render a YouTube Music now-playing SVG card for your README'
branding:
  icon: 'music'
  color: 'red'
inputs:
  tracks:
    description: 'One or more YouTube/YouTube Music URLs, one per line'
    required: true
  mode:
    description: 'random | sequential — how to pick a track when more than one is given'
    required: false
    default: 'random'
  size:
    description: 'banner | compact'
    required: false
    default: 'banner'
  art-style:
    description: 'static | vinyl | cassette | cd | neon | vinyl-cover | vinyl-sleeve'
    required: false
    default: 'static'
  art-shape:
    description: 'circle | square — static style only'
    required: false
    default: 'circle'
  accent-color:
    description: 'Hex color for the equalizer bars and badge'
    required: false
    default: '#7dd3fc'
  vinyl-speed:
    description: 'slow | normal | fast — applies to any spinning style: vinyl, cd, cassette, vinyl-cover, vinyl-sleeve'
    required: false
    default: 'normal'
  label-size:
    description: 'small | large — applies to vinyl, vinyl-cover, and vinyl-sleeve'
    required: false
    default: 'small'
  output-path:
    description: 'Path to write the generated SVG'
    required: false
    default: 'now-playing.svg'
  state-path:
    description: 'Path to the sequential-mode state file'
    required: false
    default: '.now-playing-state.json'
outputs:
  track-url:
    description: 'The URL of the track that was rendered this run'
runs:
  using: 'node20'
  main: 'dist/index.js'
