name: 'YTMusicDisplayWidget'
description: 'Render a YouTube Music now-playing SVG card for your README'
branding:
  icon: 'music'
  color: 'red'
inputs:
  tracks:
    description: 'One or more YouTube/YouTube Music URLs, one per line'
    required: true
  mode:
    description: 'random | sequential — how to pick a track when more than one is given'
    required: false
    default: 'random'
  size:
    description: 's | m | l | xl'
    required: false
    default: 'l'
  art-style:
    description: 'static | vinyl | cassette | neon | vinyl-sleeve'
    required: false
    default: 'static'
  art-shape:
    description: 'circle | square — static style only'
    required: false
    default: 'circle'
  accent-color:
    description: 'Hex color for the neon art style glow ring. Also the default for wave-color if that is not set.'
    required: false
    default: '#7dd3fc'
  wave-color:
    description: 'Hex color for the waveform (l/xl) or equalizer bars (s/m). Defaults to accent-color.'
    required: false
    default: ''
  vinyl-speed:
    description: 'slow | normal | fast — applies to any spinning style: vinyl, cassette, vinyl-sleeve'
    required: false
    default: 'normal'
  label-size:
    description: 'small | large — applies to vinyl and vinyl-sleeve'
    required: false
    default: 'small'
  background:
    description: 'blurred | full — blurred is a soft glass backdrop behind the art; full is a crisp edge-to-edge cover image with a scrim. Ignored by the neon style, which always uses a flat backdrop.'
    required: false
    default: 'blurred'
  output-path:
    description: 'Path to write the generated SVG'
    required: false
    default: 'now-playing.svg'
  state-path:
    description: 'Path to the sequential-mode state file'
    required: false
    default: '.now-playing-state.json'
outputs:
  track-url:
    description: 'The URL of the track that was rendered this run'
runs:
  using: 'node20'
  main: 'dist/index.js'
